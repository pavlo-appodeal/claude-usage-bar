name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Build .app bundle
        run: make app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUsageBar.app
          path: ClaudeUsageBar.app
