name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and zip
        run: make zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageBar.zip
          generate_release_notes: true
